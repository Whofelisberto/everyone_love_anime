services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: everyone_love_anime_db
    ports:
      - "5435:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d everyone_love_anime_db"]
      interval: 10s
      timeout: 5s
      retries: 5


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: everyone-love-anime-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://admin:admin@db:5432/everyone_love_anime_db
      JWT_SECRET_KEY: sua_chave_secreta_super_segura_aqui
    ports:
      - "5001:5001"
    depends_on:
      db:
        condition: service_healthy


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: everyone-love-anime-frontend
    restart: always
    environment:
      VITE_BASE_URL: http://127.0.0.1:5001
    ports:
      - "5175:5174"
    depends_on:
      - backend


volumes:
  db_data:
     driver: local
